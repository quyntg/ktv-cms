<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>KTV</title>
        <script src="https://unpkg.com/page/page.js"></script>
        <script type="module" src="./js/main.js"></script>
        <link rel="stylesheet" href="./style/style.css">
    </head>
    <body>
        <div id="app"></div>

        <!-- Global modal container: modal HTML always present (moved out of JS) -->
        <div id="modal-root">
            <div id="app-modal">
                <div class="modal-backdrop" id="modal-backdrop" style="display:none">
                    <div class="modal-card">
                        <div class="modal-title" id="modal-title"></div>
                        <div class="modal-body" id="modal-body"></div>
                        <div class="modal-actions" id="modal-actions"></div>
                    </div>
                </div>
            </div>
        </div>
        <footer class="site-footer index-footer">
            <div class="footer-inner">
                <a href="https://advtv.vn/" target="_blank" rel="noopener noreferrer" class="logo"><img src="./data/logo.png" alt="Logo" class="footer-logo"></a>
                <div class="footer-text">© <span id="year"></span> ADVTV. All rights reserved.</div>
            </div>
        </footer>
        <script>document.getElementById('year').innerText = new Date().getFullYear()</script>
    </body>
</html>
