<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Đăng nhập</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        <script type="module" src="../js/main.js"></script>
        <link rel="stylesheet" href="../style/style.css">
    </head>
    <body>
        <div class="container center-vertical">
            <div class="card login-card">
                <div class="brand">
                    <a href="https://advtv.vn/" target="_blank" rel="noopener noreferrer" class="logo"><img src="./data/logo.png" alt="Logo" class="logo-img"></a>
                    <div>
                        <h1>Đăng nhập</h1>
                    </div>
                </div>
                <input id="username" placeholder="Tài khoản" required />
                <input id="password" type="password" placeholder="Mật khẩu" required />
                <div class="login-mode-row" style="margin:8px 0;">
                    <label class="login-mode-label">Chế độ:</label>
                    <label class="login-mode-radio"><input type="radio" name="loginMode" value="admin" checked> Quản trị</label>
                    <label class="login-mode-radio"><input type="radio" name="loginMode" value="display"> Trình chiếu</label>
                </div>
                <div class="error" id="error"></div>
                <div class="row">
                    <button id="loginBtn" class="btn">Đăng nhập</button>
                </div>
            </div>
        </div>
    </body>
</html>
