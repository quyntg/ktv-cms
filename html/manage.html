<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Quản lý nội dung</title>

</head>
<body>
    <div class="page">
    <div class="manage-header">
        <div class="account" id="accountRoot">
            <button id="accountBtn" class="btn small">Tài khoản</button>
            <div class="account-menu" id="accountMenu" aria-hidden="true">
                <div class="account-name" id="accountName">--</div>
                <button id="logoutBtn" class="btn">Đăng xuất</button>
            </div>
        </div>
    </div>

    <div class="manage-title">Danh sách thiết bị</div>

    <section class="devices">
        <div class="manage-controls">
            <button id="addDevice" class="btn">Thêm thiết bị</button>
        </div>

        <div id="deviceList" class="device-cards"></div>
</section>

    <!-- rooms removed from manage UI -->
